<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #070711;
    --bg-secondary: #0d0d1f;
    --neon-green: #00ff88;
    --neon-pink: #ff0066;
    --neon-blue: #00d4ff;
    --neon-purple: #bb00ff;
    --neon-gold: #ffd700;
    --text-primary: #e0e0ff;
  }

  body {
    background: var(--bg-primary);
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 32px 32px;
    color: var(--text-primary);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ---- HEADER ---- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--neon-blue);
    text-shadow:
      0 0 7px var(--neon-blue),
      0 0 20px var(--neon-blue),
      0 0 42px rgba(0,212,255,.4);
    letter-spacing: 4px;
  }

  .score {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--neon-gold);
    text-shadow: 0 0 10px rgba(255,215,0,.6);
  }

  .timer {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--neon-pink);
    text-shadow: 0 0 10px rgba(255,0,102,.6);
  }

  /* ---- SLOT WINDOW ---- */
  .slot-window {
    background: var(--bg-secondary);
    border: 2px solid var(--neon-purple);
    border-radius: 12px;
    padding: 20px 8px;
    box-shadow:
      0 0 15px rgba(187,0,255,.3),
      inset 0 0 30px rgba(187,0,255,.05);
    display: flex;
    justify-content: center;
    gap: 4px;
  }

  .slot-cell {
    flex: 1;
    max-width: 120px;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(187,0,255,.25);
    border-radius: 8px;
  }

  /* ---- EKG LINE ---- */
  .ekg-wrap {
    width: 100%;
    height: 48px;
    overflow: hidden;
    position: relative;
  }

  .ekg-wrap svg {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
  }

  .ekg-line {
    fill: none;
    stroke: var(--neon-green);
    stroke-width: 2;
    filter: drop-shadow(0 0 4px var(--neon-green));
  }

  /* ---- FEEDBACK ---- */
  .feedback {
    min-height: 32px;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
  }

  /* ---- PULSE BUTTON ---- */
  .pulse-btn {
    width: 100%;
    min-height: 80px;
    border: 2px solid var(--neon-green);
    border-radius: 14px;
    background: rgba(0,255,136,.08);
    color: var(--neon-green);
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 6px;
    cursor: pointer;
    box-shadow:
      0 0 20px rgba(0,255,136,.35),
      inset 0 0 20px rgba(0,255,136,.08);
    animation: breathe 2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.03); }
  }

  /* ---- COMBO ROW ---- */
  .combo-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
  }

  .combo-label {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--neon-blue);
    text-shadow: 0 0 8px rgba(0,212,255,.5);
  }

  .streak {
    font-size: 20px;
    letter-spacing: 2px;
    opacity: .25;
  }

  .streak.active { opacity: 1; }

  /* ---- TIMER URGENCY ---- */
  .timer.urgent {
    animation: urgent-pulse .5s ease-in-out infinite;
    color: #ff0033;
    text-shadow: 0 0 14px rgba(255,0,51,.8);
  }

  .timer.urgent-bounce {
    animation: timer-bounce .3s ease-out;
  }

  .timer.last-3 {
    font-size: 33px;
    transition: font-size .2s ease;
  }

  @keyframes urgent-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: .4; }
  }

  @keyframes timer-bounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ---- FEEDBACK ---- */
  .feedback.show {
    animation: feedback-pop .15s ease-out forwards;
  }

  .feedback.hide {
    animation: feedback-fade .2s ease-out forwards;
  }

  @keyframes feedback-pop {
    0%   { transform: scale(.5); opacity: 0; }
    70%  { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes feedback-fade {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  .feedback.near-miss {
    box-shadow: 0 0 20px var(--neon-pink), 0 0 40px rgba(255,0,102,.3);
    border-radius: 6px;
    padding: 4px 12px;
    animation: feedback-pop .15s ease-out forwards, near-miss-shake .4s ease-out;
  }

  @keyframes near-miss-shake {
    0%, 100% { transform: translateX(0); }
    20%  { transform: translateX(-6px); }
    40%  { transform: translateX(6px); }
    60%  { transform: translateX(-4px); }
    80%  { transform: translateX(4px); }
  }

  /* ---- COMBO ---- */
  .combo-label.up {
    animation: combo-up .2s ease-out;
  }

  @keyframes combo-up {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .combo-label.lost {
    animation: combo-lost .5s ease-out;
    color: var(--neon-pink);
  }

  @keyframes combo-lost {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .combo-lost-float {
    position: fixed;
    pointer-events: none;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink);
    z-index: 1000;
    animation: combo-float .8s ease-out forwards;
  }

  @keyframes combo-float {
    0%   { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-60px); opacity: 0; }
  }

  /* ---- SLOT CELLS ---- */
  .slot-cell.wobble {
    animation: wobble .4s ease-out;
  }

  .slot-cell.near-miss-glow {
    box-shadow: 0 0 20px rgba(255,0,102,.8), inset 0 0 15px rgba(255,0,102,.3);
    border-color: var(--neon-pink);
    transition: box-shadow .1s, border-color .1s;
  }

  @keyframes wobble {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-5px); }
    30% { transform: translateX(5px); }
    45% { transform: translateX(-4px); }
    60% { transform: translateX(4px); }
    75% { transform: translateX(-2px); }
    90% { transform: translateX(2px); }
  }

  .pulse-btn:disabled {
    opacity: .4;
    cursor: default;
    animation: none;
  }

  .score-popup {
    position: fixed;
    pointer-events: none;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 22px;
    z-index: 1000;
    animation: popup-rise .8s ease-out forwards;
  }

  @keyframes popup-rise {
    0%   { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-80px); opacity: 0; }
  }

  /* ---- EKG DYNAMIC ---- */
  .ekg-line.pink {
    stroke: var(--neon-pink);
    filter: drop-shadow(0 0 6px var(--neon-pink));
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="logo">PULSE</div>
    <div class="score">0000</div>
    <div class="timer">60</div>
  </header>

  <!-- Slot Window -->
  <div class="slot-window">
    <div class="slot-cell">⚡</div>
    <div class="slot-cell">⚡</div>
    <div class="slot-cell">⚡</div>
  </div>

  <!-- EKG Line -->
  <div class="ekg-wrap">
    <svg viewBox="0 0 480 48" preserveAspectRatio="none">
      <polyline class="ekg-line" points="0,24 480,24"/>
    </svg>
  </div>

  <!-- Feedback -->
  <div class="feedback"></div>

  <!-- Pulse Button -->
  <button class="pulse-btn">PULSE!</button>

  <!-- Combo Row -->
  <div class="combo-row">
    <div class="combo-label">COMBO ×1</div>
    <div class="streak">🔥🔥🔥</div>
  </div>

</div>

<script>
const SYMBOLS = ['⚡','💎','🔥','⭐','💜','🌀','✨','🎯'];
const TIERS = [
  { name: 'SPARK ⚡',     points: 1,   color: 'var(--neon-green)',  weight: 45 },
  { name: 'FLASH 💎',     points: 5,   color: 'var(--neon-blue)',   weight: 25 },
  { name: 'BURST 🔥',     points: 15,  color: 'var(--neon-purple)', weight: 15 },
  { name: 'SURGE 💜',     points: 50,  color: '#dd44ff',            weight: 10 },
  { name: 'PULSE MAX ✨', points: 200, color: 'var(--neon-gold)',   weight: 5  },
];

const state = {
  score: 50,
  combo: 1,
  streak: 0,
  maxStreak: 0,
  maxCombo: 1,
  timeLeft: 60,
  isRunning: false,
  totalClicks: 0,
  nextWinIn: 0,
  ekgFlatline: false,
};

const $ = s => document.querySelector(s);
const $score    = $('.score');
const $timer    = $('.timer');
const $feedback = $('.feedback');
const $combo    = $('.combo-label');
const $streak   = $('.streak');
const $btn      = $('.pulse-btn');
const $cells    = document.querySelectorAll('.slot-cell');
const $ekgLine  = $('.ekg-line');

let timerInterval = null;
let feedbackTimeout = null;

function generateWinTicket() {
  return Math.floor(Math.random() * 14) + 1;
}

function getWinTier() {
  const roll = Math.random() * 100;
  let cum = 0;
  for (const tier of TIERS) {
    cum += tier.weight;
    if (roll < cum) return tier;
  }
  return TIERS[0];
}

function checkNearMiss() {
  return Math.random() < 0.3;
}

function resolveColor(c) {
  if (c.startsWith('var('))
    return getComputedStyle(document.documentElement).getPropertyValue(c.slice(4, -1)).trim();
  return c;
}

// ---- SLOT REEL ANIMATION ----
function animateSlots(isWin, isNearMiss, callback) {
  const duration = 150;
  const interval = 25;
  const steps = duration / interval;
  let step = 0;

  let finalSymbols;
  if (isWin) {
    const sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
    finalSymbols = [sym, sym, sym];
  } else {
    // 3 different symbols
    const shuffled = [...SYMBOLS].sort(() => Math.random() - 0.5);
    finalSymbols = [shuffled[0], shuffled[1], shuffled[2]];
  }

  const spin = setInterval(() => {
    step++;
    $cells.forEach(c => c.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
    if (step >= steps) {
      clearInterval(spin);
      if (isNearMiss) {
        // Show "matching" third symbol briefly, then switch
        $cells[0].textContent = finalSymbols[0];
        $cells[1].textContent = finalSymbols[1];
        $cells[2].textContent = finalSymbols[0]; // tease match
        setTimeout(() => {
          $cells[2].textContent = finalSymbols[2]; // switch away
          $cells[2].classList.add('wobble', 'near-miss-glow');
          setTimeout(() => {
            $cells[2].classList.remove('wobble', 'near-miss-glow');
          }, 400);
          callback();
        }, 60);
      } else {
        $cells[0].textContent = finalSymbols[0];
        $cells[1].textContent = finalSymbols[1];
        $cells[2].textContent = finalSymbols[2];
        callback();
      }
    }
  }, interval);
}

// ---- FEEDBACK ----
function showFeedback(text, color, isNearMiss) {
  if (feedbackTimeout) clearTimeout(feedbackTimeout);
  $feedback.className = 'feedback';
  $feedback.textContent = text;
  $feedback.style.color = color;
  void $feedback.offsetWidth;
  $feedback.classList.add(isNearMiss ? 'near-miss' : 'show');
  feedbackTimeout = setTimeout(() => {
    $feedback.classList.add('hide');
    setTimeout(() => {
      $feedback.className = 'feedback';
      $feedback.textContent = '';
    }, 200);
  }, 600);
}

// ---- COMBO ANIMATIONS ----
function animateComboUp() {
  $combo.classList.remove('up');
  void $combo.offsetWidth;
  $combo.classList.add('up');
}

function animateComboLost() {
  $combo.classList.remove('lost');
  void $combo.offsetWidth;
  $combo.classList.add('lost');
  // floating text
  const r = $combo.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'combo-lost-float';
  el.textContent = 'COMBO LOST 💔';
  el.style.left = r.left + 'px';
  el.style.top = r.top + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ---- DYNAMIC EKG ----
let ekgPhase = 0;

function generateEKGPoints(tempo, chaos, amplitude) {
  const points = [];
  const w = 480;
  const mid = 24;
  const step = 4;
  for (let x = 0; x <= w; x += step) {
    const t = (x / w) * Math.PI * 2 * (w / (tempo * 60)) + ekgPhase;
    // heartbeat-like: mostly flat, spike at beat
    const beatPos = t % (Math.PI * 2);
    let y = mid;
    if (beatPos > 2.8 && beatPos < 3.0) {
      y = mid - amplitude;
    } else if (beatPos > 3.0 && beatPos < 3.2) {
      y = mid + amplitude * 0.7;
    } else if (beatPos > 3.2 && beatPos < 3.3) {
      y = mid - amplitude * 0.3;
    } else if (beatPos > 3.3 && beatPos < 3.5) {
      y = mid + amplitude * 0.15;
    }
    // chaos adds noise
    if (chaos > 0) {
      y += (Math.random() - 0.5) * chaos * amplitude * 0.5;
    }
    y = Math.max(2, Math.min(46, y));
    points.push(`${x},${y.toFixed(1)}`);
  }
  return points.join(' ');
}

function updateEKG() {
  ekgPhase += 0.15;

  if (state.ekgFlatline) {
    $ekgLine.setAttribute('points', '0,24 480,24');
    return;
  }

  let tempo, chaos, amplitude;
  if (!state.isRunning) {
    // idle: slow, calm
    tempo = 2; chaos = 0; amplitude = 15;
  } else if (state.timeLeft <= 10) {
    // last 10s: fast, chaotic
    tempo = 0.4; chaos = 1; amplitude = 40;
    $ekgLine.classList.add('pink');
  } else {
    // active game
    tempo = 0.8; chaos = 0.2; amplitude = 25;
    $ekgLine.classList.remove('pink');
  }

  $ekgLine.setAttribute('points', generateEKGPoints(tempo, chaos, amplitude));
}

setInterval(updateEKG, 100);

// ---- TIMER ----
function updateUI() {
  $score.textContent = String(state.score).padStart(4, '0');
  $timer.textContent = state.timeLeft;

  // Timer urgency
  if (state.timeLeft <= 10 && state.isRunning) {
    $timer.classList.add('urgent');
    // bounce each second
    $timer.classList.remove('urgent-bounce');
    void $timer.offsetWidth;
    $timer.classList.add('urgent-bounce');
    // last 3 seconds: bigger
    if (state.timeLeft <= 3) {
      $timer.classList.add('last-3');
    } else {
      $timer.classList.remove('last-3');
    }
  } else {
    $timer.classList.remove('urgent', 'urgent-bounce', 'last-3');
  }

  $combo.textContent = 'COMBO ×' + state.combo;

  const fires = Math.min(state.streak, 5);
  $streak.textContent = fires > 0 ? '🔥'.repeat(fires) : '🔥🔥🔥';
  $streak.classList.toggle('active', fires > 0);
  $streak.style.opacity = fires > 0 ? '' : '.25';
}

function startTimer() {
  state.isRunning = true;
  timerInterval = setInterval(() => {
    state.timeLeft--;
    updateUI();
    if (state.timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  $btn.disabled = true;
  state.isRunning = false;
  showFeedback(`GAME OVER — ${state.score} bodů`, resolveColor('var(--neon-gold)'), false);
}

function handleClick() {
  if ($btn.disabled) return;
  if (!state.isRunning) startTimer();

  state.totalClicks++;
  state.nextWinIn--;

  const isWin = state.nextWinIn <= 0;
  const isNearMiss = !isWin && checkNearMiss();

  animateSlots(isWin, isNearMiss, () => {
    if (isWin) {
      const tier = getWinTier();
      const points = tier.points * state.combo;
      state.score += points;
      const prevCombo = state.combo;
      state.combo = Math.min(state.combo + 1, 10);
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      state.streak++;
      if (state.streak > state.maxStreak) state.maxStreak = state.streak;
      state.nextWinIn = generateWinTicket();

      showFeedback(`${tier.name} +${points}`, resolveColor(tier.color), false);
      animateComboUp();

      // Particles
      const bc = getBtnCenter();
      spawnParticles(bc.x, bc.y, tier.name);
      spawnScorePopup(bc.x - 30, bc.y - 40, '+' + points, resolveColor(tier.color));

      // Screen shake
      if (tier.name === 'SURGE 💜') screenShake(8, 400);
      if (tier.name === 'PULSE MAX ✨') {
        screenShake(15, 700);
        // EKG flatline then explosion
        state.ekgFlatline = true;
        setTimeout(() => { state.ekgFlatline = false; }, 300);
      }
    } else {
      if (state.combo > 1) {
        showFeedback('COMBO LOST 💔', resolveColor('var(--neon-pink)'), false);
        animateComboLost();
        state.combo = 1;
      } else if (isNearMiss) {
        showFeedback('Skoro! 😤', resolveColor('var(--neon-pink)'), true);
      } else {
        showFeedback('—', resolveColor('var(--text-primary)'), false);
      }
      state.streak = 0;
    }

    updateUI();
  });
}

// ---- CANVAS + PARTICLES ----
const canvas = document.createElement('canvas');
canvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:999;';
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor(x, y, config) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * config.speed;
    this.vy = (Math.random() - 0.5) * config.speed - config.upBias;
    this.size = Math.random() * config.maxSize + config.minSize;
    this.color = config.colors[Math.floor(Math.random() * config.colors.length)];
    this.life = 1.0;
    this.decay = config.decay;
    this.gravity = config.gravity || 0.1;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += this.gravity;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

const PARTICLE_CONFIGS = {
  'SPARK ⚡':     { count: 8,   speed: 4,  upBias: 1, minSize: 2, maxSize: 2, decay: 0.08,  gravity: 0.1,  colors: ['#ffd700','#00ff88'] },
  'FLASH 💎':     { count: 20,  speed: 6,  upBias: 2, minSize: 3, maxSize: 3, decay: 0.05,  gravity: 0.1,  colors: ['#00d4ff','#00ff88'] },
  'BURST 🔥':     { count: 40,  speed: 8,  upBias: 2, minSize: 4, maxSize: 4, decay: 0.04,  gravity: 0.1,  colors: ['#00ff88','#00d4ff','#ff0066','#bb00ff','#ffd700'] },
  'SURGE 💜':     { count: 70,  speed: 10, upBias: 3, minSize: 5, maxSize: 5, decay: 0.025, gravity: 0.15, colors: ['#bb00ff','#dd44ff','#ffd700'] },
  'PULSE MAX ✨': { count: 120, speed: 12, upBias: 4, minSize: 6, maxSize: 8, decay: 0.015, gravity: 0.1,  colors: ['#00ff88','#00d4ff','#ff0066','#bb00ff','#ffd700','#dd44ff'] },
};

let particles = [];

function spawnParticles(x, y, tierName) {
  const config = PARTICLE_CONFIGS[tierName];
  if (!config) return;
  for (let i = 0; i < config.count; i++) {
    particles.push(new Particle(x, y, config));
  }
}

function particleLoop() {
  if (particles.length > 0) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(ctx); });
    particles = particles.filter(p => p.life > 0);
    if (particles.length === 0) ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(particleLoop);
}
particleLoop();

// ---- SCREEN SHAKE ----
function screenShake(intensity, duration) {
  const start = Date.now();
  const shake = () => {
    const elapsed = Date.now() - start;
    if (elapsed < duration) {
      const factor = 1 - elapsed / duration;
      const dx = (Math.random() - 0.5) * intensity * factor;
      const dy = (Math.random() - 0.5) * intensity * factor;
      document.body.style.transform = `translate(${dx}px, ${dy}px)`;
      requestAnimationFrame(shake);
    } else {
      document.body.style.transform = '';
    }
  };
  shake();
}

// ---- SCORE POPUP ----
function spawnScorePopup(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = color;
  el.style.textShadow = `0 0 10px ${color}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ---- BUTTON CENTER HELPER ----
function getBtnCenter() {
  const r = $btn.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}
