<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #070711;
    --bg-secondary: #0d0d1f;
    --neon-green: #00ff88;
    --neon-pink: #ff0066;
    --neon-blue: #00d4ff;
    --neon-purple: #bb00ff;
    --neon-gold: #ffd700;
    --text-primary: #e0e0ff;
  }

  body {
    background: var(--bg-primary);
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 32px 32px;
    color: var(--text-primary);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ---- HEADER ---- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--neon-blue);
    text-shadow:
      0 0 7px var(--neon-blue),
      0 0 20px var(--neon-blue),
      0 0 42px rgba(0,212,255,.4);
    letter-spacing: 4px;
  }

  .score {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--neon-gold);
    text-shadow: 0 0 10px rgba(255,215,0,.6);
  }

  .timer {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--neon-pink);
    text-shadow: 0 0 10px rgba(255,0,102,.6);
  }

  /* ---- SLOT WINDOW ---- */
  .slot-window {
    background: var(--bg-secondary);
    border: 2px solid var(--neon-purple);
    border-radius: 12px;
    padding: 20px 8px;
    box-shadow:
      0 0 15px rgba(187,0,255,.3),
      inset 0 0 30px rgba(187,0,255,.05);
    display: flex;
    justify-content: center;
    gap: 4px;
  }

  .slot-cell {
    flex: 1;
    max-width: 120px;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(187,0,255,.25);
    border-radius: 8px;
  }

  /* ---- EKG LINE ---- */
  .ekg-wrap {
    width: 100%;
    height: 48px;
    overflow: hidden;
    position: relative;
  }

  .ekg-wrap svg {
    position: absolute;
    top: 0;
    height: 100%;
    width: 200%;
    animation: ekg-scroll 3s linear infinite;
  }

  @keyframes ekg-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .ekg-line {
    fill: none;
    stroke: var(--neon-green);
    stroke-width: 2;
    filter: drop-shadow(0 0 4px var(--neon-green));
  }

  /* ---- FEEDBACK ---- */
  .feedback {
    min-height: 32px;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
  }

  /* ---- PULSE BUTTON ---- */
  .pulse-btn {
    width: 100%;
    min-height: 80px;
    border: 2px solid var(--neon-green);
    border-radius: 14px;
    background: rgba(0,255,136,.08);
    color: var(--neon-green);
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 6px;
    cursor: pointer;
    box-shadow:
      0 0 20px rgba(0,255,136,.35),
      inset 0 0 20px rgba(0,255,136,.08);
    animation: breathe 2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.03); }
  }

  /* ---- COMBO ROW ---- */
  .combo-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
  }

  .combo-label {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--neon-blue);
    text-shadow: 0 0 8px rgba(0,212,255,.5);
  }

  .streak {
    font-size: 20px;
    letter-spacing: 2px;
    opacity: .25;
  }

  .streak.active { opacity: 1; }

  .timer.urgent {
    animation: urgent-pulse .5s ease-in-out infinite;
    color: #ff0033;
    text-shadow: 0 0 14px rgba(255,0,51,.8);
  }

  @keyframes urgent-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: .4; }
  }

  .feedback.show {
    animation: feedback-pop .4s ease-out;
  }

  @keyframes feedback-pop {
    0%   { transform: scale(.5); opacity: 0; }
    60%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .combo-label.lost {
    animation: combo-lost .5s ease-out;
    color: var(--neon-pink);
  }

  @keyframes combo-lost {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .pulse-btn:disabled {
    opacity: .4;
    cursor: default;
    animation: none;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="logo">PULSE</div>
    <div class="score">0000</div>
    <div class="timer">60</div>
  </header>

  <!-- Slot Window -->
  <div class="slot-window">
    <div class="slot-cell">⚡</div>
    <div class="slot-cell">⚡</div>
    <div class="slot-cell">⚡</div>
  </div>

  <!-- EKG Line -->
  <div class="ekg-wrap">
    <svg viewBox="0 0 960 48" preserveAspectRatio="none">
      <polyline class="ekg-line" points="
        0,24 40,24 60,24 70,10 80,38 90,6 100,42 110,24 130,24
        180,24 200,24 210,24 220,10 230,38 240,6 250,42 260,24 280,24
        330,24 350,24 360,24 370,10 380,38 390,6 400,42 410,24 430,24
        480,24 500,24 510,24 520,10 530,38 540,6 550,42 560,24 580,24
        630,24 650,24 660,24 670,10 680,38 690,6 700,42 710,24 730,24
        780,24 800,24 810,24 820,10 830,38 840,6 850,42 860,24 880,24
        960,24"/>
    </svg>
  </div>

  <!-- Feedback -->
  <div class="feedback"></div>

  <!-- Pulse Button -->
  <button class="pulse-btn">PULSE!</button>

  <!-- Combo Row -->
  <div class="combo-row">
    <div class="combo-label">COMBO ×1</div>
    <div class="streak">🔥🔥🔥</div>
  </div>

</div>

<script>
const SYMBOLS = ['⚡','💎','🔥','⭐','💜','🌀','✨','🎯'];
const TIERS = [
  { name: 'SPARK ⚡',     points: 1,   color: 'var(--neon-green)',  weight: 45 },
  { name: 'FLASH 💎',     points: 5,   color: 'var(--neon-blue)',   weight: 25 },
  { name: 'BURST 🔥',     points: 15,  color: 'var(--neon-purple)', weight: 15 },
  { name: 'SURGE 💜',     points: 50,  color: '#dd44ff',            weight: 10 },
  { name: 'PULSE MAX ✨', points: 200, color: 'var(--neon-gold)',   weight: 5  },
];

const state = {
  score: 50,
  combo: 1,
  streak: 0,
  maxStreak: 0,
  maxCombo: 1,
  timeLeft: 60,
  isRunning: false,
  totalClicks: 0,
  nextWinIn: 0,
};

const $ = s => document.querySelector(s);
const $score    = $('.score');
const $timer    = $('.timer');
const $feedback = $('.feedback');
const $combo    = $('.combo-label');
const $streak   = $('.streak');
const $btn      = $('.pulse-btn');
const $cells    = document.querySelectorAll('.slot-cell');

let timerInterval = null;

function generateWinTicket() {
  return Math.floor(Math.random() * 14) + 1;
}

function getWinTier() {
  const roll = Math.random() * 100;
  let cum = 0;
  for (const tier of TIERS) {
    cum += tier.weight;
    if (roll < cum) return tier;
  }
  return TIERS[0];
}

function checkNearMiss() {
  return Math.random() < 0.3;
}

function randomSymbols() {
  return Array.from({ length: 3 }, () => SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
}

function showFeedback(text, color) {
  $feedback.textContent = text;
  $feedback.style.color = color;
  $feedback.classList.remove('show');
  void $feedback.offsetWidth;
  $feedback.classList.add('show');
}

function updateUI() {
  $score.textContent = String(state.score).padStart(4, '0');
  $timer.textContent = state.timeLeft;

  if (state.timeLeft <= 10 && state.isRunning) {
    $timer.classList.add('urgent');
  } else {
    $timer.classList.remove('urgent');
  }

  $combo.textContent = 'COMBO ×' + state.combo;

  const fires = Math.min(state.streak, 5);
  $streak.textContent = '🔥'.repeat(fires) || '🔥🔥🔥';
  $streak.classList.toggle('active', fires > 0);
  if (!fires) $streak.style.opacity = '.25';
  else $streak.style.opacity = '';

  const syms = randomSymbols();
  $cells.forEach((c, i) => c.textContent = syms[i]);
}

function startTimer() {
  state.isRunning = true;
  timerInterval = setInterval(() => {
    state.timeLeft--;
    updateUI();
    if (state.timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  $btn.disabled = true;
  state.isRunning = false;
  showFeedback(`GAME OVER — ${state.score} bodů`, 'var(--neon-gold)');
}

function handleClick() {
  if ($btn.disabled) return;

  if (!state.isRunning) startTimer();

  state.totalClicks++;
  state.nextWinIn--;

  if (state.nextWinIn <= 0) {
    // WIN
    const tier = getWinTier();
    const points = tier.points * state.combo;
    state.score += points;
    state.combo = Math.min(state.combo + 1, 10);
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    state.nextWinIn = generateWinTicket();
    showFeedback(`${tier.name} +${points}`, tier.color);
  } else {
    // LOSE
    if (state.combo > 1) {
      showFeedback('COMBO LOST 💔', 'var(--neon-pink)');
      $combo.classList.remove('lost');
      void $combo.offsetWidth;
      $combo.classList.add('lost');
      state.combo = 1;
    } else if (checkNearMiss()) {
      showFeedback('Skoro! 😤', 'var(--neon-pink)');
    } else {
      showFeedback('—', 'var(--text-primary)');
    }
    state.streak = 0;
  }

  updateUI();
}

// Init
state.nextWinIn = generateWinTicket();
updateUI();
$score.textContent = '0050';
$btn.addEventListener('click', handleClick);
</script>
</body>
</html>
